name: Sync images from Google Drive

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6 AM UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gdown
        run: pip install gdown

      - name: Download images from Drive
        run: python3 .github/scripts/sync-drive-images.py

      - name: Commit and push new images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          if git diff --cached --quiet; then
            echo "No new images — nothing to commit."
          else
            COUNT=$(git diff --cached --name-only | wc -l)
            git commit -m "Sync ${COUNT} image(s) from Google Drive"
            git push
          fi
